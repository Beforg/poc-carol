<section class="about" id="sobre">
  <div class="container about__content">
    <article class="about__image-panel">
      <span class="about__badge">Sobre a Loja da Carol</span>
      <h2 class="about__title">Feito com as maos, pensado para durar</h2>
      <p class="about__text">
        Trabalhamos com lotes pequenos e curadoria afetiva para criar ambientes acolhedores.
      </p>
    </article>

    <article class="about__care-panel">
      <h3 class="about__care-title">Nosso cuidado</h3>
      <div class="about__care-grid">
        @for (item of careItems; track item.title) {
          <div class="about__care-item">
            <p class="about__item-title">{{ item.title }}</p>
            <p class="about__item-text">{{ item.text }}</p>
          </div>
        }
      </div>
    </article>
  </div>
</section>
