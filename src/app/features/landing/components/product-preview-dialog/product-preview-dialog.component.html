<div class="product-preview">
  <button class="product-preview__close" type="button" (click)="close()" aria-label="Fechar visualizacao">
    Fechar
  </button>

  <div class="product-preview__layout">
    <div class="product-preview__media">
      <img [src]="product.image" [alt]="'Referencia ' + product.reference" loading="lazy" />
    </div>

    <div class="product-preview__content">
      <p class="product-preview__reference">REF: {{ product.reference }}</p>
      <p class="product-preview__description">{{ product.description }}</p>
      <p class="product-preview__price">{{ product.price | currency: 'BRL':'symbol':'1.2-2':'pt-BR' }}</p>

      <button class="btn-primary product-preview__button" type="button" (click)="addToCart()">
        Adicionar ao carrinho
      </button>
    </div>
  </div>
</div>
