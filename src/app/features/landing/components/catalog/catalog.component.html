<section class="catalog" id="catalogo">
  <div class="container">
    <header class="catalog__header">
      <h2 class="section-title">Nosso Catálogo</h2>
      <p class="section-description">
        Clique no card para ampliar a imagem. No celular, os itens aparecem em coluna vertical para facilitar a navegação.
      </p>
    </header>

    <div class="catalog__filters" role="group" aria-label="Filtrar catalogo">
      @for (filter of filterOptions; track filter.key) {
        <button
          type="button"
          class="catalog__filter"
          [class.is-active]="filter.type === activeType"
          (click)="setFilter(filter.type)"
        >
          {{ filter.label }}
        </button>
      }
    </div>

    <div class="catalog__grid" #catalogStart>
      @for (product of products; track trackByProductId($index, product)) {
        <app-card
          [product]="product"
          (preview)="openProductPreview($event)"
          (addToCart)="addProduct($event)"
        />
      }
    </div>

    <mat-paginator
      class="catalog__paginator"
      [length]="totalProducts"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="pageSizeOptions"
      [showFirstLastButtons]="true"
      aria-label="Paginacao do catalogo"
      (page)="onPageChange($event)"
    />
  </div>
</section>
