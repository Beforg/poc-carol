<section class="catalog" id="catalogo">
  <div class="container">
    <header class="catalog__header">
      <h2 class="section-title">Nosso Catálogo</h2>
      <p class="section-description">
        Clique no card para ampliar a imagem. No celular, deslize horizontalmente para ver mais itens.
      </p>
    </header>

    <div class="catalog__grid">
      @for (product of products; track trackByProductId($index, product)) {
        <app-card
          [product]="product"
          (preview)="openProductPreview($event)"
          (addToCart)="addProduct($event)"
        />
      }
    </div>

    <mat-paginator
      class="catalog__paginator"
      [length]="totalProducts"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="pageSizeOptions"
      [showFirstLastButtons]="true"
      aria-label="Paginacao do catalogo"
      (page)="onPageChange($event)"
    />
  </div>
</section>
